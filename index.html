<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Trabalhos</title>
   <style>
    * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body { 
        background: #f4f7fc; 
        margin: 0; 
        padding: 20px; 
        /* Fundo padrão caso a imagem não carregue */
    }
    .app { max-width: 1300px; margin: 0 auto; }
    
    .login-box { 
        /* Troque a URL abaixo pela sua imagem preferida */
        background: rgba(255,255,255,0.9) url('https://images.unsplash.com/photo-1588345921523-c2dcdb7f1dcd?w=1200') no-repeat center center;
        background-size: cover;
        background-blend-mode: overlay;
        padding: 30px; 
        border-radius: 16px; 
        box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
        max-width: 400px; 
        margin: 100px auto; 
        text-align: center; 
    }0
</style>
    <!-- Bibliotecas para Excel e PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- Tela de Login com Nome de Usuário -->
<div id="loginScreen" class="login-box">
    <h2>🔐 Acesso ao Sistema</h2>
    <p style="color:#64748b">Entre com seu usuário e senha</p>
    <input type="text" id="usernameInput" placeholder="Usuário" value="">
    <input type="password" id="senhaInput" placeholder="Senha" value="">
    <button onclick="fazerLogin()">Acessar</button>
    <div id="loginErrorMsg"></div>
    <div id="resetSuccessMsg"></div>
    <div style="display: flex; justify-content: space-between; margin-top: 10px;">
        <button class="link-btn" onclick="mostrarCriarConta()">➕ Criar nova conta</button>
        <button class="link-btn" onclick="resetarSenha()">🔑 Esqueci minha senha</button>
    </div>
    <p style="font-size:13px; margin-top:20px; color:#64748b;">Dados salvos na nuvem do Firebase.</p>
</div>

<!-- Sistema Principal (igual) -->
<div id="mainApp" class="app main-content">
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <h1>📋 Registro de Trabalhos (Nuvem)</h1>
        <div>
            <span id="syncBadge" class="status-sync">☁️ Conectado à nuvem</span>
            <button class="secondary" onclick="logout()" style="margin-left:15px">Sair</button>
        </div>
    </div>
    
    <div class="card">
        <h3 style="margin-top:0">➕ Novo Registro</h3>
        <div class="form-grid">
            <div class="input-group"><label>Cliente *</label><input type="text" id="clienteInput" placeholder="Ex: Clínica Vida"></div>
            <div class="input-group"><label>Paciente *</label><input type="text" id="pacienteInput" placeholder="Nome do paciente"></div>
            <div class="input-group"><label>Data Entrega *</label><input type="date" id="dataInput"></div>
            <div class="input-group"><label>Trabalho *</label><input type="text" id="trabalhoInput" placeholder="Ex: Prótese Total"></div>
            <div class="input-group" style="grid-column: span 2;"><label>Observações</label><textarea id="obsInput" placeholder="Detalhes adicionais..."></textarea></div>
            <div style="display: flex; align-items: flex-end;"><button onclick="adicionarRegistro()" style="padding: 14px 28px;">💾 Salvar Trabalho</button></div>
        </div>
        <input type="hidden" id="editId" value="">
    </div>
    
    <div class="card">
        <div class="toolbar">
            <div>
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Filtrar..." onkeyup="filtrarTabela()">
                <select id="mesFiltro" onchange="filtrarTabela()" style="padding:12px; border-radius:30px; border:1.5px solid #e2e8f0; margin-left:10px;"><option value="">Todos os meses</option></select>
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="exportarExcel()" class="secondary">📊 Excel</button>
                <button onclick="exportarPDF()" class="secondary">📄 PDF</button>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table id="tabelaTrabalhos">
                <thead><tr><th>Data</th><th>Cliente</th><th>Paciente</th><th>Trabalho</th><th>Observações</th><th>Ações</th></tr></thead>
                <tbody id="tabelaBody"></tbody>
            </table>
        </div>
        <div class="resumo" id="resumoContador"></div>
    </div>
    <div class="footer-note">Dados sincronizados via Firebase. Acesso compartilhado.</div>
</div>

<script type="module">
  // --- CONFIGURAÇÃO DO FIREBASE (SUAS CHAVES) ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    signOut, 
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs, 
    doc, 
    updateDoc, 
    deleteDoc, 
    query, 
    orderBy,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnMX4UBhjRL168I45voBfshzPAH7inhpY",
    authDomain: "syfolab.firebaseapp.com",
    projectId: "syfolab",
    storageBucket: "syfolab.firebasestorage.app",
    messagingSenderId: "78534923355",
    appId: "1:78534923355:web:dd626ea1f1d1371a1e1b7e",
    measurementId: "G-SK3VN5SHEY"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let dados = [];
  const loginScreen = document.getElementById('loginScreen');
  const mainApp = document.getElementById('mainApp');
  let currentUser = null;

  // --- FUNÇÃO PARA BUSCAR E-MAIL A PARTIR DO NOME DE USUÁRIO ---
  async function getEmailFromUsername(username) {
    const userDocRef = doc(db, "usuarios", username);
    const userDoc = await getDoc(userDocRef);
    if (userDoc.exists()) {
      return userDoc.data().email;
    } else {
      throw new Error("Usuário não encontrado.");
    }
  }

  // --- LOGIN COM NOME DE USUÁRIO ---
  window.fazerLogin = async function() {
    const username = document.getElementById('usernameInput').value.trim();
    const password = document.getElementById('senhaInput').value;
    const errorMsg = document.getElementById('loginErrorMsg');
    errorMsg.textContent = '';

    if (!username || !password) {
      errorMsg.textContent = 'Preencha usuário e senha.';
      return;
    }

    try {
      const email = await getEmailFromUsername(username);
      await signInWithEmailAndPassword(auth, email, password);
      // Login bem-sucedido, onAuthStateChanged redireciona
    } catch (error) {
      console.error('Erro no login:', error);
      if (error.message.includes('Usuário não encontrado')) {
        errorMsg.textContent = 'Usuário não encontrado.';
      } else if (error.code === 'auth/wrong-password') {
        errorMsg.textContent = 'Senha incorreta.';
      } else if (error.code === 'auth/invalid-email') {
        errorMsg.textContent = 'E-mail associado inválido.';
      } else {
        errorMsg.textContent = 'Erro ao fazer login. Verifique os dados.';
      }
    }
  };

  // --- CRIAR NOVA CONTA COM NOME DE USUÁRIO E E-MAIL ---
  window.mostrarCriarConta = function() {
    // Exibe um pequeno formulário para criar conta
    const username = prompt("Escolha um nome de usuário (ex: jupereira):");
    if (!username) return;
    const email = prompt("Digite um e-mail válido (não aparecerá no login, é só para recuperação de senha):");
    if (!email) return;
    const password = prompt("Digite uma senha (mínimo 6 caracteres):");
    if (!password || password.length < 6) {
      alert('A senha deve ter pelo menos 6 caracteres.');
      return;
    }

    // Primeiro, verifica se o nome de usuário já existe
    getDoc(doc(db, "usuarios", username)).then(async (docSnap) => {
      if (docSnap.exists()) {
        alert('Este nome de usuário já está em uso. Escolha outro.');
        return;
      }
      
      try {
        // Cria a conta no Firebase Authentication
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        // Salva o mapeamento no Firestore
        await setDoc(doc(db, "usuarios", username), {
          email: email
        });
        alert('Conta criada com sucesso! Você será redirecionado.');
        // Força login com o novo usuário
        document.getElementById('usernameInput').value = username;
        document.getElementById('senhaInput').value = password;
        fazerLogin();
      } catch (error) {
        alert('Erro ao criar conta: ' + error.message);
      }
    });
  };

  // --- RECUPERAR SENHA (USA O E-MAIL ASSOCIADO AO USUÁRIO) ---
  window.resetarSenha = async function() {
    const username = document.getElementById('usernameInput').value.trim();
    if (!username) {
      alert('Digite seu nome de usuário no campo acima para recuperar a senha.');
      return;
    }
    const resetMsg = document.getElementById('resetSuccessMsg');
    const errorMsg = document.getElementById('loginErrorMsg');
    resetMsg.textContent = '';
    errorMsg.textContent = '';

    try {
      const email = await getEmailFromUsername(username);
      await sendPasswordResetEmail(auth, email);
      resetMsg.textContent = '✅ E-mail de redefinição enviado! Verifique a caixa de entrada do e-mail associado.';
    } catch (error) {
      if (error.message.includes('Usuário não encontrado')) {
        errorMsg.textContent = 'Usuário não encontrado.';
      } else {
        errorMsg.textContent = 'Erro ao enviar e-mail: ' + error.message;
      }
    }
  };

  window.logout = function() {
    signOut(auth).then(() => {
      currentUser = null;
    }).catch((error) => {
      console.error('Erro ao sair:', error);
    });
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      loginScreen.style.display = 'none';
      mainApp.style.display = 'block';
      carregarDadosDoFirestore();
    } else {
      currentUser = null;
      loginScreen.style.display = 'block';
      mainApp.style.display = 'none';
      document.getElementById('usernameInput').value = '';
      document.getElementById('senhaInput').value = '';
    }
  });

  // --- CRUD (mantido igual) ---
  async function carregarDadosDoFirestore() {
    const q = query(collection(db, "trabalhos"), orderBy("data", "desc"));
    const querySnapshot = await getDocs(q);
    dados = [];
    querySnapshot.forEach((doc) => {
      dados.push({ id: doc.id, ...doc.data() });
    });
    atualizarTabela();
    popularFiltroMeses();
    document.getElementById('syncBadge').innerHTML = `☁️ ${dados.length} registros na nuvem`;
  }

  window.adicionarRegistro = async function() {
    const cliente = document.getElementById('clienteInput').value.trim();
    const paciente = document.getElementById('pacienteInput').value.trim();
    const data = document.getElementById('dataInput').value;
    const trabalho = document.getElementById('trabalhoInput').value.trim();
    const obs = document.getElementById('obsInput').value.trim();
    
    if(!cliente || !paciente || !data || !trabalho) {
      alert('Preencha os campos obrigatórios: Cliente, Paciente, Data e Trabalho.');
      return;
    }
    
    const registro = { cliente, paciente, data, trabalho, obs };
    const editId = document.getElementById('editId').value;
    
    if(editId) {
      const docRef = doc(db, "trabalhos", editId);
      await updateDoc(docRef, registro);
      document.getElementById('editId').value = '';
    } else {
      await addDoc(collection(db, "trabalhos"), registro);
    }
    
    limparForm();
    await carregarDadosDoFirestore();
  };

  window.editarRegistro = function(id) {
    const item = dados.find(d => d.id === id);
    if(!item) return;
    document.getElementById('clienteInput').value = item.cliente;
    document.getElementById('pacienteInput').value = item.paciente;
    document.getElementById('dataInput').value = item.data;
    document.getElementById('trabalhoInput').value = item.trabalho;
    document.getElementById('obsInput').value = item.obs || '';
    document.getElementById('editId').value = id;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.excluirRegistro = async function(id) {
    if(confirm('Excluir este registro?')) {
      const docRef = doc(db, "trabalhos", id);
      await deleteDoc(docRef);
      await carregarDadosDoFirestore();
    }
  };

  function limparForm() {
    document.getElementById('clienteInput').value = '';
    document.getElementById('pacienteInput').value = '';
    document.getElementById('dataInput').value = new Date().toISOString().split('T')[0];
    document.getElementById('trabalhoInput').value = '';
    document.getElementById('obsInput').value = '';
    document.getElementById('editId').value = '';
  }

  function formatarDataISO(dataStr) {
    if(!dataStr) return '';
    const partes = dataStr.split('-');
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }
  
  window.filtrarTabela = function() {
    const termo = document.getElementById('searchInput').value.toLowerCase();
    const mesSelecionado = document.getElementById('mesFiltro').value;
    
    let filtrados = dados.filter(item => {
      const texto = `${item.cliente} ${item.paciente} ${item.trabalho} ${item.obs}`.toLowerCase();
      const matchTermo = !termo || texto.includes(termo);
      const matchMes = !mesSelecionado || item.data.startsWith(mesSelecionado);
      return matchTermo && matchMes;
    });
    
    const tbody = document.getElementById('tabelaBody');
    tbody.innerHTML = '';
    
    filtrados.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${formatarDataISO(item.data)}</td>
        <td>${item.cliente}</td>
        <td>${item.paciente}</td>
        <td>${item.trabalho}</td>
        <td style="max-width:250px">${item.obs || ''}</td>
        <td class="acoes-td">
          <button class="secondary" onclick="editarRegistro('${item.id}')">✏️</button>
          <button class="danger" onclick="excluirRegistro('${item.id}')">🗑️</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    
    document.getElementById('resumoContador').innerHTML = `
      📋 Total de registros exibidos: ${filtrados.length} / ${dados.length} totais
    `;
  };
  
  function atualizarTabela() { filtrarTabela(); }
  
  function popularFiltroMeses() {
    const select = document.getElementById('mesFiltro');
    const mesesSet = new Set();
    dados.forEach(d => { if(d.data) mesesSet.add(d.data.substring(0,7)); });
    const meses = Array.from(mesesSet).sort().reverse();
    select.innerHTML = '<option value="">Todos os meses</option>';
    meses.forEach(m => {
      const option = document.createElement('option');
      option.value = m;
      const [ano, mes] = m.split('-');
      option.textContent = `${mes}/${ano}`;
      select.appendChild(option);
    });
  }
  
  window.exportarExcel = function() {
    const wsData = dados.map(d => ({
      'Data': formatarDataISO(d.data),
      'Cliente': d.cliente,
      'Paciente': d.paciente,
      'Trabalho': d.trabalho,
      'Observações': d.obs || ''
    }));
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, "Trabalhos");
    XLSX.writeFile(wb, `trabalhos_${new Date().toISOString().slice(0,10)}.xlsx`);
  };
  
  window.exportarPDF = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16);
    doc.text("Relatório de Trabalhos", 14, 20);
    doc.setFontSize(11);
    const body = dados.map(d => [formatarDataISO(d.data), d.cliente, d.paciente, d.trabalho, d.obs || '']);
    doc.autoTable({
      head: [['Data', 'Cliente', 'Paciente', 'Trabalho', 'Observações']],
      body: body,
      startY: 30,
      styles: { fontSize: 9 },
      columnStyles: { 4: { cellWidth: 50 } }
    });
    doc.save(`relatorio_${new Date().toISOString().slice(0,10)}.pdf`);
  };
</script>
</body>
</html>
